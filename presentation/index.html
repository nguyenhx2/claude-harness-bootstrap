<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Harness Bootstrap - Presentation</title>
<style>
  :root{
    /* Brand tone #35348f drives the whole surface. */
    --brand:#35348f; --brand-d:#25246a; --brand-l:#5655c2; --brand-xl:#8f8ee6;
    --tint:#eeeefc; --tint2:#e2e1fa;
    --page:#ffffff; --ink:#191932; --dim:#5c5c7d; --faint:#8b8bab; --line:#e7e7f3;
    --green:#1a7f52; --green-t:#e6f6ee;
    --red:#c33c3c; --red-t:#fdeceb;
    --purple:#6d3fa8; --purple-t:#f2ebfc;
    --amber:#9a6b12; --amber-t:#fdf3e0;
    --bar:52px; --strip:26px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--brand); color:var(--ink); overflow:hidden;
    font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,
      "Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
  }

  /* ---------- backdrop ---------- */
  .bg{position:fixed;inset:0;overflow:hidden;z-index:0}
  .bg i{position:absolute;display:block;background:var(--brand-l);opacity:.5;border-radius:40px}
  .bg i:nth-child(1){width:38vw;height:26vh;left:-6vw;top:8vh;border-radius:0 60px 60px 0}
  .bg i:nth-child(2){width:26vw;height:34vh;right:-8vw;top:22vh;border-radius:60px 0 0 60px}
  .bg i:nth-child(3){width:44vw;height:14vh;left:22vw;bottom:-4vh;opacity:.35}
  .bg i:nth-child(4){width:12vw;height:12vw;left:12vw;top:-4vw;border-radius:50%;opacity:.35}
  .bg i:nth-child(5){width:8vw;height:8vw;right:16vw;bottom:16vh;border-radius:50%;opacity:.3}

  /* ---------- top bar ---------- */
  .bar{
    position:fixed;top:0;left:0;right:0;height:var(--bar);z-index:30;
    display:flex;align-items:center;gap:14px;padding:0 22px;color:#fff;
  }
  .brand{display:flex;align-items:center;gap:9px;font-weight:650;font-size:14px;letter-spacing:.2px}
  .brand svg{width:24px;height:24px}
  .spacer{flex:1}
  .langs{display:flex;gap:3px;background:rgba(255,255,255,.14);border-radius:999px;padding:3px}
  .langs button{
    background:none;border:0;color:rgba(255,255,255,.72);font:inherit;font-size:12px;font-weight:700;
    padding:5px 13px;border-radius:999px;cursor:pointer;letter-spacing:.5px;
  }
  .langs button:hover{color:#fff}
  .langs button.on{background:#fff;color:var(--brand)}
  .ibtn{
    background:rgba(255,255,255,.14);border:0;color:#fff;width:32px;height:32px;
    border-radius:9px;cursor:pointer;display:grid;place-items:center;
  }
  .ibtn:hover{background:rgba(255,255,255,.26)}
  .ibtn svg{width:16px;height:16px}
  .count{color:rgba(255,255,255,.8);font-size:12.5px;font-variant-numeric:tabular-nums;letter-spacing:.4px}

  /* ---------- the notebook page ---------- */
  .stage{
    position:absolute;left:0;right:0;top:var(--bar);bottom:var(--strip);
    display:grid;place-items:center;padding:14px 20px;z-index:10;
  }
  .page{
    position:relative;width:min(2400px,97vw);height:100%;background:var(--page);
    border-radius:26px;box-shadow:0 24px 60px rgba(0,0,0,.28);overflow:hidden;
  }
  .pagemark{position:absolute;top:20px;right:24px;z-index:5;display:flex;align-items:center;gap:8px;opacity:.85}
  .pagemark svg{width:22px;height:22px}
  .pagemark span{font-size:11.5px;font-weight:700;color:var(--brand);letter-spacing:.3px}

  .arrow{
    position:absolute;top:50%;transform:translateY(-50%);z-index:6;
    width:40px;height:40px;border-radius:50%;border:0;
    background:var(--tint);color:var(--brand);cursor:pointer;display:grid;place-items:center;
  }
  .arrow:hover{background:var(--tint)}
  .arrow svg{width:18px;height:18px}
  .arrow.l{left:10px} .arrow.r{right:10px}

  .deck{position:absolute;inset:0}
  .slide{position:absolute;inset:0;display:none;padding:52px 56px 34px;overflow:hidden}
  .slide.active{display:flex;flex-direction:column;justify-content:center}
  .slide.in-next{animation:inNext .44s cubic-bezier(.22,1,.36,1)}
  .slide.in-prev{animation:inPrev .44s cubic-bezier(.22,1,.36,1)}
  @keyframes inNext{from{opacity:0;transform:translateX(42px)}to{opacity:1;transform:none}}
  @keyframes inPrev{from{opacity:0;transform:translateX(-42px)}to{opacity:1;transform:none}}

  /* one root size drives everything so fit() can fill the page */
  .wrap{width:100%;font-size:calc(17px * var(--fit,1))}
  .stag>*{opacity:0;animation:rise .5s cubic-bezier(.22,1,.36,1) forwards}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

  /* ---------- type ---------- */
  .eyebrow{
    display:inline-flex;align-items:center;gap:.5em;font-size:.74em;font-weight:800;
    text-transform:uppercase;letter-spacing:.13em;color:var(--brand);margin:0 0 .8em;
    background:var(--tint);padding:.4em .8em;border-radius:999px;
  }
  .eyebrow svg{width:1.2em;height:1.2em}
  h1{font-size:3em;line-height:1.08;margin:0 0 .28em;letter-spacing:-.025em;font-weight:800}
  h2{font-size:2.1em;line-height:1.14;margin:0 0 .2em;letter-spacing:-.022em;font-weight:800}
  .sub{font-size:1.04em;color:var(--dim);margin:0 0 1.2em;max-width:76ch}
  .lead{font-size:1.18em;color:var(--ink);margin:0 0 1em;max-width:70ch}

  /* No rules or borders anywhere: separation comes from fill and rhythm. */
  table{width:100%;border-collapse:separate;border-spacing:0 .3em;font-size:.86em}
  th,td{text-align:left;padding:.62em .9em;vertical-align:top}
  th{color:var(--brand);font-size:.78em;text-transform:uppercase;letter-spacing:.09em;font-weight:800;padding-bottom:0}
  tbody tr{background:var(--tint)}
  tbody tr:nth-child(even){background:#f5f5fd}
  tbody td:first-child{border-radius:10px 0 0 10px}
  tbody td:last-child{border-radius:0 10px 10px 0}
  td strong{color:var(--ink);font-weight:750}
  .t-bad td:nth-child(2){color:var(--red)}
  .t-good td:nth-child(3){color:var(--green)}
  code{
    background:var(--tint);border-radius:5px;padding:.1em .4em;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.9em;color:var(--brand-d);
  }

  ul.big{list-style:none;padding:0;margin:0;display:grid;gap:.7em}
  ul.big li{
    display:flex;gap:.9em;padding:.95em 1.15em;background:var(--tint);border-radius:14px;
  }
  ul.big li .ic{
    flex:0 0 auto;width:2em;height:2em;padding:.35em;border-radius:9px;
    background:#fff;color:var(--brand);
  }
  ul.big li b{display:block;color:var(--ink);margin-bottom:.15em;font-size:1.05em}
  ul.big li span{color:var(--dim);font-size:.95em}
  ul.big li.red{background:var(--red-t)} ul.big li.red .ic{color:var(--red)}
  ul.big li.green{background:var(--green-t)} ul.big li.green .ic{color:var(--green)}
  ul.big li.purple{background:var(--purple-t)} ul.big li.purple .ic{color:var(--purple)}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(13em,1fr));gap:.9em}
  .card{background:var(--tint);border-radius:18px;padding:1.25em}
  .card .ic{
    width:2.4em;height:2.4em;padding:.5em;border-radius:12px;background:#fff;
    color:var(--brand);margin-bottom:.6em;
  }
  .card h3{margin:0 0 .25em;font-size:1.08em;color:var(--ink)}
  .card p{margin:0;color:var(--dim);font-size:.9em}
  .card.g{background:var(--green-t)} .card.g .ic{color:var(--green)}
  .card.p{background:var(--purple-t)} .card.p .ic{color:var(--purple)}
  .card.r{background:var(--red-t)} .card.r .ic{color:var(--red)}

  .quote{
    background:var(--tint);border-radius:18px;padding:.75em 1em;margin:0 0 .9em;
    font-size:1.5em;line-height:1.34;color:var(--ink);font-weight:700;letter-spacing:-.012em;
  }
  .kicker{color:var(--dim);font-size:1.02em;margin:0}
  .kicker b{color:var(--brand)}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(9.5em,1fr));gap:.8em}
  .stat{background:var(--tint);border-radius:14px;padding:1em;text-align:center}
  .stat b{display:block;font-size:2.5em;line-height:1;color:var(--brand);letter-spacing:-.03em;font-variant-numeric:tabular-nums}
  .stat span{display:block;margin-top:.45em;color:var(--dim);font-size:.8em;line-height:1.4}
  .stat.g{background:var(--green-t)} .stat.g b{color:var(--green)}
  .stat.r{background:var(--red-t)} .stat.r b{color:var(--red)}
  .stat.a{background:var(--amber-t)} .stat.a b{color:var(--amber)}

  .note{margin-top:.9em;color:var(--faint);font-size:.83em}

  /* em (not vh) so it shrinks with fit(), and an explicit aspect-ratio so the
     box has a known height before the file loads - otherwise fit() measures a
     collapsed video, scales up, and the slide overflows once it arrives. */
  video{
    width:100%;aspect-ratio:16/9;max-height:19em;height:auto;object-fit:contain;
    border-radius:14px;background:#0b0b18;display:block;margin:0 auto;
  }
  .vtabs{display:flex;flex-wrap:wrap;gap:.4em;margin:0 0 .7em}
  .vtabs button{
    background:var(--tint);border:0;color:var(--dim);
    padding:.42em .9em;border-radius:999px;font:inherit;font-size:.82em;cursor:pointer;
  }
  .vtabs button:hover{background:var(--tint2)}
  .vtabs button.on{background:var(--brand);color:#fff}

  .cta{display:flex;flex-wrap:wrap;gap:.6em;margin-top:.4em}
  .cta a{
    display:inline-flex;align-items:center;gap:.5em;text-decoration:none;
    background:var(--brand);color:#fff;padding:.65em 1.2em;border-radius:10px;font-weight:700;font-size:.94em;
  }
  .cta a.ghost{background:var(--tint);color:var(--brand)}
  .cta a:hover{filter:brightness(1.08)}
  .cta a svg{width:1.05em;height:1.05em}
  pre.cmd{
    background:var(--ink);border-radius:12px;padding:.95em 1.1em;margin:0 0 1em;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.88em;color:#e9e9ff;overflow-x:auto;
  }
  pre.cmd .c{color:#8f8ee6}

  /* ---------- animated layer diagrams ---------- */
  .lay{display:grid;gap:.5em;margin:.2em 0 0}
  .lay .row{
    display:flex;align-items:center;gap:.9em;padding:.85em 1.15em;border-radius:14px;
    background:var(--tint);
    opacity:0;transform:translateX(-18px);
    animation:slideIn .5s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes slideIn{to{opacity:1;transform:none}}
  .lay .row .tag{
    flex:0 0 auto;min-width:7.4em;font-weight:800;font-size:.92em;color:var(--brand);
  }
  .lay .row .desc{flex:1;font-size:.88em;color:var(--dim)}
  .lay .row .meta{flex:0 0 auto;font-size:.78em;color:var(--faint);text-align:right;min-width:6em}
  .lay .row.ram{background:var(--amber-t)}
  .lay .row.ram .tag{color:var(--amber)}
  .lay .row.disk{background:var(--green-t)}
  .lay .row.disk .tag{color:var(--green)}
  /* the compaction sweep: RAM tiers ghost out, disk tiers stay solid */
  .lay .row.ram::after{
    content:'';position:absolute;inset:0;border-radius:12px;background:var(--page);
    opacity:0;animation:ghost 4.6s ease-in-out infinite;
  }
  .lay .row{position:relative;overflow:hidden}
  @keyframes ghost{0%,42%{opacity:0}56%,74%{opacity:.72}92%,100%{opacity:0}}
  .sweep{
    position:absolute;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--red),transparent);
    animation:sweepY 4.6s ease-in-out infinite;opacity:0;border-radius:2px;
  }
  @keyframes sweepY{0%,40%{opacity:0;transform:translateY(0)}48%{opacity:1}56%{opacity:1;transform:translateY(var(--sweepTo,120px))}64%,100%{opacity:0;transform:translateY(var(--sweepTo,120px))}}
  .laywrap{position:relative}
  .laylegend{margin-top:.7em;font-size:.8em;color:var(--faint);display:flex;gap:1.2em;flex-wrap:wrap}
  .laylegend b{color:var(--red);font-weight:700}

  /* orchestration pipeline */
  .pipe{display:grid;gap:.75em}
  .pipe .lvl{display:flex;gap:.6em;flex-wrap:wrap;justify-content:center}
  .pipe .node{
    padding:.6em 1em;border-radius:11px;background:var(--tint);color:var(--brand);
    font-weight:750;font-size:.86em;opacity:0;transform:translateY(10px);
    animation:pop .45s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes pop{to{opacity:1;transform:none}}
  .pipe .node.orch{background:var(--brand);color:#fff;font-size:.95em}
  .pipe .node.gate{background:var(--green-t);color:var(--green)}
  .pipe .node.dev{background:var(--purple-t);color:var(--purple)}
  .pipe .conn{height:18px;position:relative}
  .pipe .conn::before{
    content:'';position:absolute;left:50%;top:0;bottom:0;width:2px;background:var(--line);transform:translateX(-50%);
  }
  .pipe .conn::after{
    content:'';position:absolute;left:50%;top:0;width:7px;height:7px;border-radius:50%;
    background:var(--brand);transform:translate(-50%,0);
    animation:travel 2.6s ease-in-out infinite;
  }
  @keyframes travel{0%{top:-2px;opacity:0}20%{opacity:1}80%{opacity:1}100%{top:16px;opacity:0}}
  .pipe .caption{text-align:center;font-size:.82em;color:var(--faint)}

  /* security: nested rings */
  .rings{position:relative;display:grid;place-items:center;padding:.4em 0}
  .ring{
    position:absolute;border-radius:20px;
    display:grid;place-items:start center;font-weight:800;font-size:.72em;
    padding-top:.5em;letter-spacing:.04em;text-transform:uppercase;
    opacity:0;animation:pop .5s cubic-bezier(.22,1,.36,1) forwards;
  }
  /* Nested filled blocks, no outlines: each layer is a solid step inward. */
  .ring.r1{width:100%;height:15.5em;color:var(--red);background:var(--red-t)}
  .ring.r2{width:78%;height:12em;color:var(--amber);background:var(--amber-t)}
  .ring.r3{width:56%;height:8.5em;color:var(--purple);background:var(--purple-t)}
  .ring.r4{width:34%;height:5em;color:var(--green);background:var(--green-t)}
  /* The protected thing sits at the centre, inside the innermost ring. */
  .core{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-25%);
    font-size:.8em;font-weight:800;color:#fff;
    background:var(--brand);border-radius:10px;padding:.35em .8em;
  }
  .attack{
    position:absolute;top:-.2em;left:50%;width:11px;height:11px;border-radius:50%;
    background:var(--red);transform:translateX(-50%);
    animation:attack 3.4s ease-in-out infinite;
  }
  @keyframes attack{
    0%{top:-1.2em;opacity:0} 12%{opacity:1}
    30%{top:1.1em;opacity:1} 40%{top:1.1em;transform:translateX(-50%) scale(1.7);opacity:.9}
    50%{top:1.1em;transform:translateX(-50%) scale(.6);opacity:0}
    100%{top:1.1em;opacity:0}
  }
  .blocked{
    position:absolute;top:2.4em;left:50%;transform:translateX(-50%);
    font-size:.74em;font-weight:800;color:#fff;background:var(--red);border-radius:8px;
    padding:.25em .7em;opacity:0;
    animation:blink 3.4s ease-in-out infinite;
  }
  @keyframes blink{0%,36%{opacity:0}44%,66%{opacity:1}74%,100%{opacity:0}}

  /* ---------- overview ---------- */
  .ov{position:fixed;inset:0;z-index:60;background:rgba(20,19,60,.97);display:none;padding:64px 5vw 34px;overflow-y:auto}
  .ov.open{display:block;animation:fade .2s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .ov h4{margin:0 0 16px;font-size:12px;text-transform:uppercase;letter-spacing:.14em;color:var(--brand-xl)}
  .thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;max-width:1300px;margin:0 auto}
  .thumb{
    background:#fff;border:3px solid transparent;border-radius:11px;padding:13px;cursor:pointer;
    text-align:left;font:inherit;min-height:96px;display:flex;flex-direction:column;gap:6px;
    transition:transform .15s,border-color .15s;
  }
  .thumb:hover{transform:translateY(-3px)}
  .thumb.on{border-color:var(--brand-xl)}
  .thumb .n{font-size:10.5px;color:var(--faint);font-variant-numeric:tabular-nums;letter-spacing:.08em}
  .thumb .t{font-size:13px;line-height:1.32;color:var(--brand-d);font-weight:700}
  .thumb .ic{width:16px;height:16px;color:var(--brand);margin-top:auto}

  @media (max-width:820px){
    :root{--strip:92px}
    .slide{padding:44px 26px 26px}
    .arrow{display:none}
  }
  @media (prefers-reduced-motion:reduce){
    .slide.in-next,.slide.in-prev,.stag>*,.lay .row,.pipe .node,.ring{animation:none;opacity:1;transform:none}
    .sweep,.attack,.blocked,.lay .row.ram::after,.pipe .conn::after{animation:none;opacity:0}
  }
</style>
</head>

function insertBefore(navEn, slide){
  const i = S.findIndex(s => s.nav && s.nav.en === navEn);
  if(i >= 0) S.splice(i, 0, slide); else S.push(slide);
}
insertBefore('Memory hierarchy',   CTX_LAYERS);
insertBefore('Task state machine', ORCH_LAYERS);
insertBefore('Enforced layers',    SEC_LAYERS);

/* ============================================================
   ENGINE
   ============================================================ */
const deck=document.getElementById('deck'), ovEl=document.getElementById('ov'),
      thumbsEl=document.getElementById('thumbs'),
      counterEl=document.getElementById('counter');
let lang = localStorage.getItem('ahb-lang') || 'en';
let cur = 0, vidIdx = 0;
const L = o => (o && (o[lang] ?? o.en)) || '';
const icon = (id, cls) => `<svg class="${cls||''}"><use href="#${id}"/></svg>`;

function slideHTML(s){
  const eyebrow = s.eyebrow ? `<p class="eyebrow">${icon(s.icon)}${L(s.eyebrow)}</p>` : '';
  const title = s.title ? `<h2>${L(s.title)}</h2>` : '';
  const sub = s.sub ? `<p class="sub">${L(s.sub)}</p>` : '';
  const note = s.note ? `<p class="note">${L(s.note)}</p>` : '';
  let body = '';

  if(s.kind==='cover'){
    return `<div class="wrap stag">
      <p class="eyebrow">${icon('i-logo')}github.com/nguyenhx2/agent-harness-bootstrap</p>
      <h1>${L(s.title)}</h1><p class="sub">${L(s.sub)}</p><p class="lead">${L(s.lead)}</p>
      <div class="cta">
        <a href="https://github.com/nguyenhx2/agent-harness-bootstrap" target="_blank" rel="noopener">${icon('i-gh')}GitHub</a>
        <a class="ghost" href="../video/" target="_blank" rel="noopener">${icon('i-play')}Video gallery</a>
      </div></div>`;
  }
  if(s.kind==='table'){
    const cols = L(s.cols);
    body = `<table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>`
      + s.rows.map(r=>`<tr class="${s.rowClass||''}">${L(r).map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')
      + `</tbody></table>`;
  }
  if(s.kind==='bullets'){
    body = `<ul class="big">${s.items.map(i=>
      `<li class="${s.cls||''}">${icon(s.icon,'ic')}<div><b>${L(i.t)}</b><span>${L(i.d)}</span></div></li>`).join('')}</ul>`;
  }
  if(s.kind==='cards'){
    body = `<div class="cards">${s.cards.map(c=>
      `<div class="card ${c.cls||''}">${icon(c.ic,'ic')}<h3>${L(c.t)}</h3><p>${L(c.d)}</p></div>`).join('')}</div>`;
  }
  if(s.kind==='quote'){
    const pre = s.pre ? `<pre class="cmd">${L(s.pre)}</pre>` : '';
    body = `${pre}<p class="quote">${L(s.quote)}</p><p class="kicker">${L(s.kicker)}</p>`;
  }
  if(s.kind==='stats'){
    body = `<div class="stats">${s.stats.map(x=>
      `<div class="stat ${x.cls||''}"><b>${x.v}</b><span>${L(x.l)}</span></div>`).join('')}</div>`
      + (s.quote ? `<p class="quote" style="margin-top:1em">${L(s.quote)}</p>` : '');
  }
  if(s.kind==='video'){
    body = `<div class="vtabs" id="vtabs">${s.clips.map((c,i)=>
        `<button data-v="${i}" class="${i===vidIdx?'on':''}">${L(c.t)}</button>`).join('')}</div>
      <video id="vid" src="../video/mp4/${s.clips[vidIdx].f}.mp4"
             controls autoplay muted loop playsinline preload="auto"></video>`;
  }
  if(s.kind==='ctxlayers'){
    const rows = s.rows.map((r,i)=>
      `<div class="row ${r.cls}" style="animation-delay:${120+i*130}ms">
         <span class="tag">${L(r.tag)}</span>
         <span class="desc">${L(r.d)}</span>
         <span class="meta">${L(r.m)}</span>
       </div>`).join('');
    body = `<div class="laywrap"><div class="lay">${rows}</div><div class="sweep" style="--sweepTo:11em"></div></div>
            <p class="laylegend">${L(s.legend)}</p>`;
  }
  if(s.kind==='pipe'){
    let d = 100;
    body = `<div class="pipe">` + s.levels.map((lv,i)=>{
      const nodes = lv.items.map(it=>{ d+=110; return `<span class="node ${lv.cls}" style="animation-delay:${d}ms">${L(it)}</span>`; }).join('');
      const conn = i ? `<div class="conn"></div>` : '';
      return `${conn}<div class="lvl">${nodes}</div><div class="caption">${L(lv.cap)}</div>`;
    }).join('') + `</div>`;
  }
  if(s.kind==='rings'){
    const rings = s.rings.map((r,i)=>
      `<div class="ring r${i+1}" style="animation-delay:${140+i*150}ms">${L(r)}</div>`).join('');
    body = `<div class="rings" style="height:16em">
      ${rings}<div class="attack"></div><div class="blocked">${L(s.blocked)}</div>
      <div class="core">${L(s.core)}</div></div>`;
  }
  if(s.kind==='close'){
    const c1 = lang==='vi'?'viết hợp đồng trước':lang==='ja'?'先に契約を書く':'write the contract first';
    const c2 = lang==='vi'?'dựng harness cho repo này':lang==='ja'?'このリポジトリのハーネスを構築':'build the harness for this repo';
    body = `<pre class="cmd"><span class="c"># ${c1}</span>
/spec-builder

<span class="c"># ${c2}</span>
/harness-bootstrap</pre>
      <div class="cta">
        <a href="https://github.com/nguyenhx2/agent-harness-bootstrap" target="_blank" rel="noopener">${icon('i-gh')}GitHub</a>
        <a class="ghost" href="../video/" target="_blank" rel="noopener">${icon('i-play')}Video gallery</a>
      </div>`;
  }
  return `<div class="wrap stag">${eyebrow}${title}${sub}${body}${note}</div>`;
}

/* Grow a slide to use the page, without ever overflowing it.
   A proportional guess oscillates: a bigger font makes cards wider, which drops
   a grid column, which makes the block taller, which shrinks it again. So this
   binary-searches for the largest scale that still fits and keeps only sizes
   that were measured to fit. */
function fit(el){
  const w = el.querySelector('.wrap');
  if(!w) return;
  const cs = getComputedStyle(el);
  const avail = el.clientHeight - parseFloat(cs.paddingTop) - parseFloat(cs.paddingBottom);
  if(avail <= 0) return;
  let lo = 0.62, hi = 1.85, best = 0.62;
  for(let i=0;i<14;i++){
    const mid = (lo + hi) / 2;
    w.style.setProperty('--fit', mid);
    if(w.scrollHeight <= avail){ best = mid; lo = mid; } else { hi = mid; }
    if(hi - lo < 0.008) break;
  }
  w.style.setProperty('--fit', best);
}

function render(dir){
  deck.innerHTML = '';
  const el = document.createElement('section');
  el.className = 'slide active ' + (dir==='prev' ? 'in-prev' : 'in-next');
  el.innerHTML = slideHTML(S[cur]);
  deck.appendChild(el);
  el.querySelectorAll('.stag > *').forEach((c,i)=>{ c.style.animationDelay = (60 + i*70) + 'ms'; });

  const vt = el.querySelector('#vtabs');
  if(vt){
    vt.addEventListener('click', e=>{
      const b = e.target.closest('button'); if(!b) return;
      vidIdx = +b.dataset.v;
      vt.querySelectorAll('button').forEach(x=>x.classList.toggle('on', x===b));
      const v = el.querySelector('#vid');
      v.src = '../video/mp4/' + S[cur].clips[vidIdx].f + '.mp4';
      v.load(); v.play().catch(()=>{});
    });
  }
  fit(el);
  // A late-loading asset can change the height after the first measurement.
  const vid = el.querySelector('#vid');
  if(vid) vid.addEventListener('loadedmetadata', ()=>fit(el), {once:true});

  counterEl.textContent = (cur+1) + ' ' + UI[lang].of + ' ' + S.length;
  document.getElementById('ovTitle').textContent = UI[lang].ov;
  document.documentElement.lang = lang==='ja'?'ja':lang==='vi'?'vi':'en';
  location.hash = '#' + (cur+1);
}

function go(i, dir){
  const n = Math.max(0, Math.min(S.length-1, i));
  const d = dir || (n > cur ? 'next' : 'prev');
  cur = n; render(d); marks();
}

function marks(){
  thumbsEl.querySelectorAll('.thumb').forEach((t,i)=>t.classList.toggle('on', i===cur));
  const t = thumbsEl.querySelector('.thumb.on');
  if(t && ovEl.classList.contains('open')) t.scrollIntoView({block:'nearest', behavior:'smooth'});
}

function buildNav(){
  thumbsEl.innerHTML = S.map((s,i)=>
    `<button class="thumb ${i===cur?'on':''}" data-i="${i}">
      <span class="n">${String(i+1).padStart(2,'0')}</span>
      <span class="t">${L(s.nav)}</span>${icon(s.icon,'ic')}</button>`).join('');
}

thumbsEl.addEventListener('click', e=>{ const b=e.target.closest('.thumb'); if(b){ go(+b.dataset.i); closeOv(); } });

function openOv(){ ovEl.classList.add('open'); marks(); }
function closeOv(){ ovEl.classList.remove('open'); }
document.getElementById('btnOv').onclick = ()=> ovEl.classList.contains('open') ? closeOv() : openOv();
document.getElementById('btnClose').onclick = closeOv;
document.getElementById('btnNext').onclick = ()=> go(cur+1,'next');
document.getElementById('btnPrev').onclick = ()=> go(cur-1,'prev');
document.getElementById('btnFull').onclick = ()=>{
  if(document.fullscreenElement) document.exitFullscreen();
  else document.documentElement.requestFullscreen().catch(()=>{});
};

document.getElementById('langs').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  lang = b.dataset.l; localStorage.setItem('ahb-lang', lang);
  document.querySelectorAll('#langs button').forEach(x=>x.classList.toggle('on', x===b));
  render('next'); buildNav(); marks();
});

function ovCols(){
  const t = getComputedStyle(thumbsEl).gridTemplateColumns;
  return Math.max(1, t.split(' ').filter(Boolean).length);
}

document.addEventListener('keydown', e=>{
  const open = ovEl.classList.contains('open');
  if(e.key==='Escape'){ closeOv(); return; }
  if(e.key==='Enter' && open){ closeOv(); return; }
  switch(e.key){
    // Arrows drive the deck whether or not the overview is open.
    case 'ArrowRight': case 'PageDown': case ' ': e.preventDefault(); go(cur+1,'next'); break;
    case 'ArrowLeft': case 'PageUp': e.preventDefault(); go(cur-1,'prev'); break;
    case 'ArrowDown': if(open){ e.preventDefault(); go(cur+ovCols(),'next'); } break;
    case 'ArrowUp': if(open){ e.preventDefault(); go(cur-ovCols(),'prev'); } break;
    case 'Home': e.preventDefault(); go(0,'prev'); break;
    case 'End': e.preventDefault(); go(S.length-1,'next'); break;
    case 'o': case 'O': open ? closeOv() : openOv(); break;
    case 'f': case 'F': document.getElementById('btnFull').click(); break;
  }
});

let x0=null;
deck.addEventListener('touchstart', e=>{ x0 = e.changedTouches[0].clientX; }, {passive:true});
deck.addEventListener('touchend', e=>{
  if(x0===null) return;
  const dx = e.changedTouches[0].clientX - x0;
  if(Math.abs(dx) > 55) go(cur + (dx<0?1:-1), dx<0?'next':'prev');
  x0=null;
}, {passive:true});

addEventListener('resize', ()=>{ const el = deck.querySelector('.slide'); if(el) fit(el); });

document.querySelectorAll('#langs button').forEach(b=>b.classList.toggle('on', b.dataset.l===lang));
const start = parseInt((location.hash||'').replace('#','')) || 1;
cur = Math.max(0, Math.min(S.length-1, start-1));
buildNav(); render('next'); marks();
</script>
</body>
</html>
