<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Harness Engineering - Presentation</title>
<link rel="stylesheet" href="fonts/andadapro.css">
<link rel="stylesheet" href="fonts/yomogi.css">
<style>
  :root{
    --brand:#35348f; --brand-d:#23225e; --brand-l:#5655c2; --brand-xl:#9d9cec;
    --tint:#eeeefc; --tint2:#e0dffa;
    --page:#fffefb; --ink:#1b1b33; --dim:#585779; --faint:#8f8eaa;
    --mark:#fff2a8;                      /* highlighter yellow */
    --mark2:#c9f7e0;                     /* highlighter mint   */
    --mark3:#ffd9d6;                     /* highlighter coral  */
    --green:#18794e; --green-t:#e4f7ed;
    --red:#c0392f;   --red-t:#fdeae8;
    --purple:#6b34a8;--purple-t:#f1e9fc;
    --amber:#8a6410; --amber-t:#fdf3dc;
    --bar:52px;
    /* ONE typeface for everything. Hierarchy comes from weight, size and
       tracking, never from swapping family. Mono appears only inside code,
       where a fixed advance width is part of the meaning. */
    --sans:"Andada Pro","Yomogi","Noto Serif JP","Hiragino Mincho ProN",
           "Yu Mincho","Yu Gothic",Meiryo,Georgia,serif;
    --mono:var(--sans);   /* code keeps the notebook hand; the tint marks it, not the family */
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--brand);color:var(--ink);overflow:hidden;
    font:16px/1.65 var(--sans);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  button,input,select,textarea{font-family:inherit}

  .bg{position:fixed;inset:0;overflow:hidden;z-index:0}
  .bg i{position:absolute;display:block;background:var(--brand-l);opacity:.45;border-radius:44px}
  .bg i:nth-child(1){width:36vw;height:26vh;left:-6vw;top:9vh;border-radius:0 64px 64px 0}
  .bg i:nth-child(2){width:24vw;height:32vh;right:-7vw;top:24vh;border-radius:64px 0 0 64px}
  .bg i:nth-child(3){width:40vw;height:13vh;left:24vw;bottom:-4vh;opacity:.32}
  .bg i:nth-child(4){width:11vw;height:11vw;left:14vw;top:-4vw;border-radius:50%;opacity:.3}

  .bar{position:fixed;top:0;left:0;right:0;height:var(--bar);z-index:30;
    display:flex;align-items:center;gap:14px;padding:0 22px;color:#fff}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:14px}
  .brand svg{width:24px;height:24px}
  .spacer{flex:1}
  .langs{display:flex;gap:3px;background:rgba(255,255,255,.15);border-radius:999px;padding:3px}
  .langs button{background:none;border:0;color:rgba(255,255,255,.75);font:inherit;font-size:12px;
    font-weight:700;padding:5px 13px;border-radius:999px;cursor:pointer;letter-spacing:.5px}
  .langs button.on{background:#fff;color:var(--brand)}
  .ibtn{background:rgba(255,255,255,.15);border:0;color:#fff;width:32px;height:32px;font:inherit;
    border-radius:9px;cursor:pointer;display:grid;place-items:center}
  .ibtn:hover{background:rgba(255,255,255,.28)}
  .ibtn svg{width:16px;height:16px}
  .count{color:rgba(255,255,255,.82);font-size:12.5px;font-variant-numeric:tabular-nums}

  /* ---------- the notebook page ---------- */
  .stage{position:absolute;left:0;right:0;top:var(--bar);bottom:26px;
    display:grid;place-items:center;padding:12px 20px;z-index:10}
  .page{
    position:relative;width:min(2400px,97vw);height:100%;background:var(--page);
    border-radius:26px;box-shadow:0 24px 60px rgba(0,0,0,.3);overflow:hidden;
    /* paper: faint ruled lines + a margin rule, the way a notebook reads */
    background-image:
      linear-gradient(90deg, transparent 0 62px, #f3c9c9 62px 63px, transparent 63px),
      repeating-linear-gradient(180deg, transparent 0 37px, #eef0f7 37px 38px);
    background-position:0 0, 0 64px;
  }
  .pagemark{position:absolute;top:18px;right:24px;z-index:5;color:var(--brand-xl)}
  .pagemark svg{width:22px;height:22px}
  .arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:6;width:40px;height:40px;
    border-radius:50%;border:0;background:var(--tint);color:var(--brand);cursor:pointer;font:inherit;
    display:grid;place-items:center}
  .arrow:hover{background:var(--tint2)}
  .arrow svg{width:18px;height:18px}
  .arrow.l{left:12px} .arrow.r{right:12px}

  .deck{position:absolute;inset:0}
  .slide{position:absolute;inset:0;display:none;overflow:hidden}
  .slide svg:not([class]){width:1em;height:1em}   /* unclassed SVGs must never fall back to 300x150 */
  .slide.active{display:block}
  /* identical geometry on every page: header band, then body band */
  .head{
    position:absolute;left:4.2%;right:4.2%;top:5.5%;min-height:20%;
    font-size:clamp(13px,1.15vw,23px);   /* viewport-only, never per-slide */
    display:flex;flex-direction:column;justify-content:flex-start;overflow:visible;
  }
  .body{
    position:absolute;left:4.2%;right:4.2%;top:29%;bottom:5.5%;
    font-size:calc(15px * var(--fit,1));
    display:flex;flex-direction:column;justify-content:center;gap:.6em;overflow:hidden;
  }
  /* the main block of a slide claims the height rather than leaving it blank */
  .body > .cards, .body > ul.big, .body > .stats, .body > .lay,
  .body > .laywrap, .body > .pipe, .body > .coverwrap{flex:1 1 auto;min-height:0}
  .cards, ul.big, .stats{align-content:stretch}
  .card{display:flex;flex-direction:column}
  .card p{margin-top:auto}
  ul.big li{align-items:center}
  .lay{height:100%}
  .laywrap{display:flex;flex-direction:column}
  .slide.in-next{animation:inNext .44s cubic-bezier(.22,1,.36,1)}
  .slide.in-prev{animation:inPrev .44s cubic-bezier(.22,1,.36,1)}
  @keyframes inNext{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}
  @keyframes inPrev{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:none}}

  .wrap{position:absolute;inset:0}
  .stag>*{opacity:0;animation:rise .5s cubic-bezier(.22,1,.36,1) forwards}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

  /* ---------- structure: step -> heading -> subtitle -> body ---------- */

  .step{
    display:inline-flex;align-items:center;gap:.5em;
    font-size:.72em;color:var(--brand);margin:0 0 .5em;font-weight:700;
    text-transform:uppercase;letter-spacing:.14em;
  }
  .step svg{width:1.35em;height:1.35em}
  h1{font-size:2.7em;line-height:1.14;margin:0 0 .2em;letter-spacing:-.02em;font-weight:840}
  h2{font-size:1.85em;line-height:1.2;margin:0 0 .12em;letter-spacing:-.015em;font-weight:840}
  .squig{display:block;width:9em;height:.5em;margin:.1em 0 .5em;color:var(--brand-xl)}
  .sub{font-size:1.02em;color:var(--dim);margin:0;line-height:1.5}
  .lead{font-size:1.16em;color:var(--ink);margin:0 0 .9em}

  /* highlighter, underline and circle: the marker vocabulary */
  mark{background:linear-gradient(180deg,transparent 52%,var(--mark) 52%,var(--mark) 92%,transparent 92%);
    color:inherit;padding:0 .1em;font-weight:700}
  mark.m2{background:linear-gradient(180deg,transparent 52%,var(--mark2) 52%,var(--mark2) 92%,transparent 92%)}
  mark.m3{background:linear-gradient(180deg,transparent 52%,var(--mark3) 52%,var(--mark3) 92%,transparent 92%)}
  u.pen{text-decoration:none;background:no-repeat bottom/100% .18em
    linear-gradient(90deg,var(--brand-xl),var(--brand-xl));padding-bottom:.08em}

  table{width:100%;border-collapse:separate;border-spacing:0 .3em;font-size:.86em}
  th,td{text-align:left;padding:.6em .9em;vertical-align:top}
  th{color:var(--brand);font-size:.76em;text-transform:uppercase;letter-spacing:.09em;font-weight:800;padding-bottom:0}
  tbody tr{background:#f6f6fd}
  tbody td:first-child{border-radius:12px 0 0 12px}
  tbody td:last-child{border-radius:0 12px 12px 0}
  td strong{color:var(--ink);font-weight:750}
  .t-bad td:nth-child(2){color:var(--red)}
  .t-good td:nth-child(3){color:var(--green)}
  code{background:var(--tint);border-radius:5px;padding:.1em .4em;
    font-family:var(--mono);font-size:.88em;color:var(--brand-d)}

  ul.big{list-style:none;padding:0;margin:0;display:grid;gap:.6em}
  ul.big li{display:flex;gap:.9em;padding:.85em 1.1em;background:#f6f6fd;border-radius:16px}
  ul.big li .ic{flex:0 0 auto;width:2.1em;height:2.1em;padding:.36em;border-radius:12px;
    background:#fff;color:var(--brand)}
  ul.big li b{display:block;color:var(--ink);margin-bottom:.12em;font-size:1.04em}
  ul.big li span{color:var(--dim);font-size:.94em}
  ul.big li .tick{flex:0 0 auto;width:1.1em;height:1.1em;color:var(--brand-xl);opacity:.55;
    align-self:flex-start;margin-top:.25em}
  ul.big li.red{background:var(--red-t)} ul.big li.red .ic{color:var(--red)}
  ul.big li.green{background:var(--green-t)} ul.big li.green .ic{color:var(--green)}
  ul.big li.purple{background:var(--purple-t)} ul.big li.purple .ic{color:var(--purple)}
  ul.big li.amber{background:var(--amber-t)} ul.big li.amber .ic{color:var(--amber)}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(13em,1fr));gap:.9em}
  .card{background:#f6f6fd;border-radius:20px;padding:1.2em;position:relative;justify-content:center;overflow:hidden}
  /* the icon is the card's artwork: large, tilted, sitting behind the words */
  .card .bgart{
    position:absolute;right:-.35em;bottom:-.55em;width:6.2em;height:6.2em;
    transform:rotate(-13deg);opacity:.13;color:currentColor;pointer-events:none;
  }
  .card.g .bgart{color:var(--green)} .card.p .bgart{color:var(--purple)}
  .card.r .bgart{color:var(--red)} .card.a .bgart{color:var(--amber)}
  .card .ic{width:2.5em;height:2.5em;padding:.5em;border-radius:14px;background:#fff;
    color:var(--brand);margin-bottom:.55em}
  .card h3{margin:0 0 .22em;font-size:1.06em;color:var(--ink)}
  .card p{margin:0;color:var(--dim);font-size:.89em}
  /* the number is circled by hand, the way you would ring a point in a notebook */
  .card .num{
    position:absolute;top:.6em;right:.75em;width:2.4em;height:2.4em;
    display:grid;place-items:center;font-size:1em;color:var(--brand);
    font-weight:800;font-variant-numeric:tabular-nums;
  }
  .card .num .ring{position:absolute;inset:0;width:100%;height:100%;color:var(--brand-xl);opacity:.85}

  .card.g{background:var(--green-t)} .card.g .ic{color:var(--green)}
  .card.p{background:var(--purple-t)} .card.p .ic{color:var(--purple)}
  .card.r{background:var(--red-t)} .card.r .ic{color:var(--red)}
  .card.a{background:var(--amber-t)} .card.a .ic{color:var(--amber)}

  /* marker frame: the "circled on the page" device from sketchnotes */
  .frame{border-radius:22px;padding:1.1em 1.3em;background:#fff;
    box-shadow:0 0 0 3px var(--mark) inset, 0 0 0 1px #e6e6f2}
  .coverwrap{display:grid;grid-template-columns:1fr 1.3fr;gap:2.2em;align-items:center}
  .coverwrap > div{display:flex;flex-direction:column;justify-content:center}
  .coverwrap .art{width:100%;height:auto;max-height:22em;object-fit:contain;border-radius:12px}
  .quote2col{display:grid;grid-template-columns:1.02fr 1fr;gap:1.7em;align-items:center}
  .quote2col .qmain img{width:100%;height:auto;max-height:19em;object-fit:contain;border-radius:12px}
  .quote2col .qside{display:flex;flex-direction:column;align-items:center;gap:.55em;text-align:center}
  .quote2col .qside .quote{font-size:1.16em}
  .quote2col .qhorse{width:8.5em;height:auto;object-fit:contain}
  @media (max-width:1100px){
    .coverwrap,.quote2col{grid-template-columns:1fr}
    .quote2col .qhorse{width:6em}
  }
  .quote{font-size:1.42em;line-height:1.36;color:var(--ink);font-weight:700;margin:0}

  .qmark{color:var(--brand);font-size:.85em;font-weight:600;margin:.5em 0 0}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(9.5em,1fr));gap:.75em}
  .stat{background:#f6f6fd;border-radius:18px;padding:1.1em;text-align:center;
    display:flex;flex-direction:column;justify-content:center}
  .stat b{display:block;font-size:2.4em;line-height:1;color:var(--brand);letter-spacing:-.03em;
    font-variant-numeric:tabular-nums}
  .stat span{display:block;margin-top:.45em;color:var(--dim);font-size:.78em;line-height:1.45}
  .stat span b{display:block;color:var(--ink);font-weight:750;margin-bottom:.15em}
  .stat.g{background:var(--green-t)} .stat.g b{color:var(--green)}
  .stat.r{background:var(--red-t)} .stat.r b{color:var(--red)}
  .stat.a{background:var(--amber-t)} .stat.a b{color:var(--amber)}

  .note{margin-top:.8em;color:var(--faint);font-size:.8em;line-height:1.5}

  video{width:auto;height:100%;max-width:100%;max-height:100%;object-fit:contain;
    border-radius:16px;background:#0b0b18;display:block;margin:0 auto}
  .vidwrap{flex:1 1 auto;min-height:0;display:flex;justify-content:center}
  .vtabs{display:flex;flex-wrap:wrap;gap:.4em;margin:0 0 .7em}
  .vtabs button{background:#f6f6fd;border:0;color:var(--dim);padding:.42em .9em;border-radius:999px;
    font:inherit;font-size:.82em;cursor:pointer}
  .vtabs button.on{background:var(--brand);color:#fff}

  .qrwrap{display:grid;place-items:center}
  .qrcard{background:#fff;border-radius:22px;padding:1.2em;box-shadow:0 10px 32px rgba(53,52,143,.16)}
  .qrcard img{width:17em;height:17em;display:block;image-rendering:pixelated}
  .cta{display:flex;flex-wrap:wrap;gap:.6em;margin-top:.4em}
  .cta a{display:inline-flex;align-items:center;gap:.5em;text-decoration:none;background:var(--brand);
    color:#fff;padding:.65em 1.2em;border-radius:12px;font-weight:700;font-size:.93em}
  .cta a.ghost{background:var(--tint);color:var(--brand)}
  .cta a svg{width:1.05em;height:1.05em}
  pre.cmd{background:var(--ink);border-radius:14px;padding:.9em 1.1em;margin:0 0 .9em;
    font-family:var(--mono);font-size:.85em;
    color:#eceafd;overflow-x:auto}
  pre.cmd .c{color:var(--brand-xl)}

  /* glossary term: dotted underline; the note is a single fixed element so no
     overflow:hidden ancestor (row, body, slide) can clip it */
  .gl{border-bottom:2px dotted var(--brand-xl);cursor:help;font-weight:700;color:var(--brand-d)}
  #tip{
    position:fixed;z-index:200;max-width:22em;background:var(--ink);color:#fff;
    padding:.65em .85em;border-radius:10px;font:500 13px/1.5 var(--sans);
    box-shadow:0 10px 30px rgba(0,0,0,.3);opacity:0;pointer-events:none;
    transition:opacity .12s;transform:translateY(4px);
  }
  #tip.show{opacity:1;transform:none}
  #tip::after{content:"";position:absolute;top:100%;left:var(--ax,50%);transform:translateX(-50%);
    border:6px solid transparent;border-top-color:var(--ink)}

  /* ---------- animated layer diagrams ---------- */
  .lay{display:grid;gap:.45em}
  .lay .row{display:flex;align-items:center;gap:.9em;padding:.8em 1.1em;border-radius:16px;
    background:#f6f6fd;position:relative;overflow:hidden;
    opacity:0;transform:translateX(-16px);animation:slideIn .5s cubic-bezier(.22,1,.36,1) forwards}
  @keyframes slideIn{to{opacity:1;transform:none}}
  .lay .row .tic{flex:0 0 auto;width:1.9em;height:1.9em;padding:.34em;border-radius:10px;
    background:#fff;color:var(--brand)}
  .lay .row.ram .tic{color:var(--amber)} .lay .row.disk .tic{color:var(--green)}
  .lay .row .tag{flex:0 0 auto;min-width:7.2em;font-weight:800;font-size:.92em;color:var(--brand)}
  .lay .row .desc{flex:1;font-size:.87em;color:var(--dim)}
  .lay .row .meta{flex:0 0 auto;font-size:.76em;color:var(--faint);text-align:right;min-width:6em}
  .lay .row.ram{background:var(--amber-t)} .lay .row.ram .tag{color:var(--amber)}
  .lay .row.disk{background:var(--green-t)} .lay .row.disk .tag{color:var(--green)}
  /* One soft brush sweep across the two volatile tiers. They stay legible;
     the wash only says these are the ones a compaction takes. */
  .lay .brush{
    position:absolute;left:-1%;width:102%;top:-2%;height:54%;pointer-events:none;z-index:3;
    color:var(--red);filter:blur(7px);opacity:0;
    animation:sweepIn 1.1s cubic-bezier(.3,.9,.4,1) forwards;animation-delay:1.35s;
  }
  .lay .brush svg{width:100%;height:100%;fill:currentColor}
  @keyframes sweepIn{
    0%{opacity:0;clip-path:inset(0 100% 0 0)}
    100%{opacity:.32;clip-path:inset(0 0 0 0)}
  }
  .lay .row.ram{opacity:1}
  .laywrap{position:relative}

  .pipe{display:grid;gap:.5em}
  .pipe .lvl{display:flex;gap:.55em;flex-wrap:wrap;justify-content:center}
  .pipe .node{padding:.55em 1em;border-radius:14px;background:#f6f6fd;color:var(--brand);
    font-weight:750;font-size:.85em;opacity:0;transform:translateY(10px);
    animation:pop .45s cubic-bezier(.22,1,.36,1) forwards}
  @keyframes pop{to{opacity:1;transform:none}}
  .pipe .node.orch{background:var(--brand);color:#fff;font-size:.95em}
  .pipe .node.gate{background:var(--green-t);color:var(--green)}
  .pipe .node.dev{background:var(--purple-t);color:var(--purple)}
  .pipe .conn{height:16px;position:relative}
  .pipe .conn::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:2px;
    background:#e3e3f2;transform:translateX(-50%)}
  .pipe .conn::after{content:'';position:absolute;left:50%;top:0;width:7px;height:7px;border-radius:50%;
    background:var(--brand);transform:translate(-50%,0);animation:travel 2.6s ease-in-out infinite}
  .pipe .conn .mark{position:absolute;left:calc(50% + 14px);top:-2px;width:26px;height:14px;
    color:var(--brand-xl);opacity:.7}
  @keyframes travel{0%{top:-2px;opacity:0}20%{opacity:1}80%{opacity:1}100%{top:14px;opacity:0}}
  .pipe .caption{text-align:center;font-size:.78em;color:var(--faint);letter-spacing:.01em}

  .ringcols{display:grid;grid-template-columns:repeat(4,1fr);gap:.7em;margin-top:.9em;flex:0 0 auto}
  .rc{background:#f6f6fd;border-radius:14px;padding:.8em .95em;display:flex;flex-direction:column;justify-content:center}
  .rc b{display:block;font-size:.9em;margin-bottom:.15em}
  .rc span{font-size:.82em;color:var(--dim);line-height:1.45}
  .rc.a{background:var(--red-t)} .rc.a b{color:var(--red)}
  .rc.b{background:var(--amber-t)} .rc.b b{color:var(--amber)}
  .rc.c{background:var(--purple-t)} .rc.c b{color:var(--purple)}
  .rc.d{background:var(--green-t)} .rc.d b{color:var(--green)}
  @media (max-width:1100px){ .ringcols{grid-template-columns:repeat(2,1fr)} }
  .rings{position:relative;display:grid;place-items:center;flex:1 1 auto;min-height:0}
  .ring{position:absolute;border-radius:22px;display:grid;place-items:start center;font-weight:800;
    font-size:.7em;padding-top:.5em;letter-spacing:.04em;text-transform:uppercase;
    opacity:0;animation:pop .5s cubic-bezier(.22,1,.36,1) forwards}
  .ring.r1{width:100%;height:100%;color:var(--red);background:var(--red-t)}
  .ring.r2{width:77%;height:74%;color:var(--amber);background:var(--amber-t)}
  .ring.r3{width:55%;height:50%;color:var(--purple);background:var(--purple-t)}
  .ring.r4{width:33%;height:27%;color:var(--green);background:var(--green-t)}
  .core{position:absolute;left:50%;top:50%;transform:translate(-50%,-25%);font-size:.78em;
    font-weight:800;color:#fff;background:var(--brand);border-radius:12px;padding:.35em .8em}
  .attack{position:absolute;top:-.2em;left:50%;width:11px;height:11px;border-radius:50%;
    background:var(--red);transform:translateX(-50%);animation:attack 3.4s ease-in-out infinite}
  @keyframes attack{0%{top:-1.2em;opacity:0}12%{opacity:1}30%{top:1.1em;opacity:1}
    40%{top:1.1em;transform:translateX(-50%) scale(1.7);opacity:.9}
    50%{top:1.1em;transform:translateX(-50%) scale(.6);opacity:0}100%{top:1.1em;opacity:0}}
  .blocked{position:absolute;top:2.3em;left:50%;transform:translateX(-50%);font-size:.72em;
    font-weight:800;color:#fff;background:var(--red);border-radius:9px;padding:.25em .7em;opacity:0;
    animation:blink 3.4s ease-in-out infinite}
  @keyframes blink{0%,36%{opacity:0}44%,66%{opacity:1}74%,100%{opacity:0}}

  /* ---------- overview ---------- */
  .ov{position:fixed;inset:0;z-index:60;background:rgba(20,19,60,.97);display:none;
    padding:64px 5vw 34px;overflow-y:auto}
  .ov.open{display:block;animation:fade .2s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .mini-slide{position:absolute;inset:0;display:block !important}
  .mini-slide *{animation:none !important;opacity:1 !important;transform:none !important}
  .mini-slide .head{font-size:19px}
  .mini-slide .body{font-size:16px}
  .ov h4{margin:0 0 16px;font-size:12px;text-transform:uppercase;letter-spacing:.14em;color:var(--brand-xl)}
  .thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;max-width:1500px;margin:0 auto}
  .thumb{background:#fff;border:3px solid transparent;border-radius:12px;padding:0;cursor:pointer;
    text-align:left;font:inherit;display:flex;flex-direction:column;overflow:hidden;
    transition:transform .15s,border-color .15s}
  .thumb:hover{transform:translateY(-3px)}
  .thumb.on{border-color:var(--brand-xl)}
  /* a real miniature of the slide, rendered from the same markup and scaled */
  .thumb .mini{position:relative;width:100%;aspect-ratio:16/10;overflow:hidden;
    background:var(--page);flex:0 0 auto;pointer-events:none}
  .thumb .mini .page-mini{
    position:absolute;top:0;left:0;width:1600px;height:1000px;transform-origin:0 0;
    background:var(--page);
  }
  .thumb .cap{display:flex;align-items:center;gap:6px;padding:7px 9px;background:#fff;
    border-top:1px solid #eceafd}
  .thumb .cap svg{width:12px;height:12px;color:var(--brand-xl);flex:0 0 auto}
  .thumb .cap .n{font-size:10px;color:var(--faint);font-variant-numeric:tabular-nums}
  .thumb .cap .t{font-size:12px;line-height:1.25;color:var(--brand-d);font-weight:700;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  @media (max-width:820px){ .slide{padding:38px 24px 24px} .arrow{display:none} }
  @media (prefers-reduced-motion:reduce){
    .slide.in-next,.slide.in-prev,.stag>*,.lay .row,.pipe .node,.ring{animation:none;opacity:1;transform:none}
    .attack,.blocked,.pipe .conn::after{animation:none;opacity:0}
    .lay .row.ram::after{animation:none;opacity:.55}
    .lay .row .strike path{animation:none;stroke-dashoffset:0}
  }
</style>

/* 15b - layer 2: hooks, exit code 2 */
{icon:"i-shield", kind:"table", step:{en:"Mechanism C · Security", vi:"Cơ chế C · Bảo mật", ja:"仕組みC · セキュリティ"},
 title:{en:"Layer 2: a hook that exits 2 decides what it cannot do", vi:"Lớp 2: một hook thoát mã 2 quyết định cái nó không được làm", ja:"第2層: exit 2 のフックが「できないこと」を決める"},
 sub:{en:"A {{g:hook|hook}} is a shell script that runs <mark>before</mark> a tool call. When it finishes, its exit status decides what happens next.",
      vi:"{{g:hook|Hook}} là một shell script chạy <mark>trước</mark> lời gọi tool. Khi nó kết thúc, mã thoát quyết định điều gì xảy ra tiếp theo.",
      ja:"{{g:hook|フック}}はツール呼び出しの<mark>前</mark>に走るシェルスクリプトです。終了時、その終了コードが次に何が起きるかを決めます。"},
 cols:{en:["Exit status","Meaning"], vi:["Mã thoát","Ý nghĩa"], ja:["終了コード","意味"]},
 rows:[
  {en:["<strong><code>0</code></strong>","<mark class='m2'>Allow.</mark> The tool call proceeds"],
   vi:["<strong><code>0</code></strong>","<mark class='m2'>Cho phép.</mark> Lời gọi tool được tiếp tục"],
   ja:["<strong><code>0</code></strong>","<mark class='m2'>許可。</mark> ツール呼び出しは実行されます"]},
  {en:["<strong><code>2</code></strong>","<mark class='m3'>Block.</mark> The tool call is abandoned and never runs. stderr is sent back to the model as the reason"],
   vi:["<strong><code>2</code></strong>","<mark class='m3'>Chặn.</mark> Lời gọi tool bị huỷ và không bao giờ chạy. stderr được trả về cho model làm lý do"],
   ja:["<strong><code>2</code></strong>","<mark class='m3'>遮断。</mark> ツール呼び出しは破棄され実行されません。stderr が理由としてモデルに返ります"]},
  {en:["<strong>other</strong>","Error, non-blocking"],
   vi:["<strong>khác</strong>","Lỗi, không chặn"],
   ja:["<strong>その他</strong>","エラー、遮断はしない"]}],
 note:{en:"The model is never asked for consent, so the guarantee does not vary with the model.",
       vi:"Model không bao giờ được hỏi ý kiến, nên đảm bảo này không đổi theo model.",
       ja:"モデルの同意は求められないため、この保証はモデルによって変わりません。"},
 nav:{en:"Exit code 2", vi:"Exit code 2", ja:"exit code 2"}},

 title:{en:"Layer 4: maxTurns stops a loop before it runs away", vi:"L\u1edbp 4: maxTurns ch\u1eb7n v\u00f2ng l\u1eb7p tr\u01b0\u1edbc khi m\u1ea5t ki\u1ec3m so\u00e1t", ja:"\u7b2c4\u5c64: maxTurns \u304c\u66b4\u8d70\u524d\u306b\u30eb\u30fc\u30d7\u3092\u6b62\u3081\u308b"},
 sub:{en:"A cap on how many turns one agent may take before it is stopped. The circuit breaker, because the cost of a stuck agent is unbounded.",
      vi:"Gi\u1edbi h\u1ea1n s\u1ed1 l\u01b0\u1ee3t m\u1ed9t agent \u0111\u01b0\u1ee3c ph\u00e9p tr\u01b0\u1edbc khi b\u1ecb d\u1eebng. C\u1ea7u dao ng\u1eaft, v\u00ec chi ph\u00ed c\u1ee7a m\u1ed9t agent b\u1ecb k\u1eb9t l\u00e0 v\u00f4 h\u1ea1n.",
      ja:"1\u4f53\u306e\u30a8\u30fc\u30b8\u30a7\u30f3\u30c8\u304c\u505c\u6b62\u3055\u308c\u308b\u307e\u3067\u306e\u30bf\u30fc\u30f3\u6570\u306e\u4e0a\u9650\u3002\u8a70\u307e\u3063\u305f\u30a8\u30fc\u30b8\u30a7\u30f3\u30c8\u306e\u30b3\u30b9\u30c8\u306f\u9752\u5929\u4e95\u306a\u306e\u3067\u3001\u3053\u308c\u306f\u30b5\u30fc\u30ad\u30c3\u30c8\u30d6\u30ec\u30fc\u30ab\u30fc\u3067\u3059\u3002"},
 items:[
  {t:{en:"Low for mechanical seats", vi:"Th\u1ea5p cho c\u00e1c vai c\u01a1 h\u1ecdc", ja:"\u6a5f\u68b0\u7684\u306a\u5e2d\u306f\u4f4e\u304f"},
   d:{en:"<code>history-tracker: 10</code>. It summarises an append-only archive, so more turns can only mean it is stuck.",
      vi:"<code>history-tracker: 10</code>. N\u00f3 t\u00f3m t\u1eaft m\u1ed9t kho ch\u1ec9-ghi-th\u00eam, n\u00ean nhi\u1ec1u l\u01b0\u1ee3t h\u01a1n ch\u1ec9 c\u00f3 ngh\u0129a l\u00e0 b\u1ecb k\u1eb9t.",
      ja:"<code>history-tracker: 10</code>\u3002\u8ffd\u8a18\u5c02\u7528\u30a2\u30fc\u30ab\u30a4\u30d6\u3092\u8981\u7d04\u3059\u308b\u3060\u3051\u306a\u306e\u3067\u3001\u30bf\u30fc\u30f3\u304c\u5897\u3048\u308b\u306e\u306f\u8a70\u307e\u308a\u306e\u8a3c\u62e0\u3002"}},
  {t:{en:"Higher for judgement seats", vi:"Cao h\u01a1n cho c\u00e1c vai ph\u00e1n \u0111o\u00e1n", ja:"\u5224\u65ad\u3092\u8981\u3059\u308b\u5e2d\u306f\u9ad8\u3081"},
   d:{en:"The debugger gets <code>30</code>: root-cause under incomplete information is the hardest single-agent task on the roster.",
      vi:"Debugger \u0111\u01b0\u1ee3c <code>30</code>: t\u00ecm nguy\u00ean nh\u00e2n g\u1ed1c d\u01b0\u1edbi th\u00f4ng tin kh\u00f4ng \u0111\u1ea7y \u0111\u1ee7 l\u00e0 vi\u1ec7c kh\u00f3 nh\u1ea5t cho m\u1ed9t agent.",
      ja:"\u30c7\u30d0\u30c3\u30ac\u30fc\u306f <code>30</code>\u3002\u4e0d\u5b8c\u5168\u306a\u60c5\u5831\u3067\u306e\u539f\u56e0\u7a76\u660e\u306f\u3001\u5358\u4e00\u30a8\u30fc\u30b8\u30a7\u30f3\u30c8\u6700\u96e3\u306e\u30bf\u30b9\u30af\u3002"}},
  {t:{en:"None for the open-ended dev seats", vi:"Kh\u00f4ng gi\u1edbi h\u1ea1n cho c\u00e1c vai dev m\u1edf", ja:"\u958b\u653e\u7684\u306adev\u5e2d\u306b\u306f\u4e0a\u9650\u306a\u3057"},
   d:{en:"A feature can legitimately take many turns, so the dev agents are capped by the task, not a turn count.",
      vi:"M\u1ed9t t\u00ednh n\u0103ng c\u00f3 th\u1ec3 c\u1ea7n nhi\u1ec1u l\u01b0\u1ee3t m\u1ed9t c\u00e1ch ch\u00ednh \u0111\u00e1ng, n\u00ean dev agent b\u1ecb gi\u1edbi h\u1ea1n b\u1edfi task, kh\u00f4ng ph\u1ea3i s\u1ed1 l\u01b0\u1ee3t.",
      ja:"\u6a5f\u80fd\u958b\u767a\u306f\u6b63\u5f53\u306b\u591a\u304f\u306e\u30bf\u30fc\u30f3\u3092\u8981\u3057\u5f97\u308b\u305f\u3081\u3001dev \u30a8\u30fc\u30b8\u30a7\u30f3\u30c8\u306f\u30bf\u30fc\u30f3\u6570\u3067\u306f\u306a\u304f\u30bf\u30b9\u30af\u3067\u533a\u5207\u3089\u308c\u307e\u3059\u3002"}}],
 note:{en:"Together with a narrow tool grant, maxTurns bounds the blast radius and the bill of any single agent, whichever model is behind it.",
       vi:"C\u00f9ng v\u1edbi vi\u1ec7c c\u1ea5p tool h\u1eb9p, maxTurns gi\u1edbi h\u1ea1n b\u00e1n k\u00ednh thi\u1ec7t h\u1ea1i v\u00e0 ho\u00e1 \u0111\u01a1n c\u1ee7a b\u1ea5t k\u1ef3 agent n\u00e0o, b\u1ea5t k\u1ec3 model n\u00e0o \u0111\u1ee9ng sau.",
       ja:"\u72ed\u3044\u30c4\u30fc\u30eb\u4ed8\u4e0e\u3068\u4f75\u305b\u3001maxTurns \u306f\u3069\u306e\u30e2\u30c7\u30eb\u3067\u3042\u308c\u3001\u5358\u4e00\u30a8\u30fc\u30b8\u30a7\u30f3\u30c8\u306e\u5f71\u97ff\u7bc4\u56f2\u3068\u8acb\u6c42\u984d\u3092\u4e0a\u9650\u3067\u6291\u3048\u307e\u3059\u3002"},

const deck=document.getElementById('deck'), ovEl=document.getElementById('ov'),

// {{g:key|label}} becomes an annotated term with a hover note
function ann(s){
  return String(s).replace(/\{\{g:(\w+)\|([^}]*)\}\}/g, (m,k,label)=>{
    const d = GLOSS[k] ? (GLOSS[k][lang] || GLOSS[k].en) : '';
    return `<span class="gl" tabindex="0" data-tip="${d.replace(/"/g,'&quot;')}">${label}</span>`;
  });
}
const L = o => ann((o && (o[lang] ?? o.en)) || '');

const SQUIG = `<svg class="squig"><use href="#i-squig"/></svg>`;

// A single fixed tooltip, positioned above the hovered term. Fixed positioning
// means no overflow:hidden ancestor (rows, body, slide) can clip it.
const tipEl = Object.assign(document.createElement('div'), {id:'tip'});
document.body.appendChild(tipEl);
let tipTerm = null;
function showTip(el){
  const tip = el.getAttribute('data-tip'); if(!tip) return;
  tipTerm = el; tipEl.textContent = tip;
  tipEl.style.opacity = '0'; tipEl.classList.add('show');
  const r = el.getBoundingClientRect();
  const tw = tipEl.offsetWidth, th = tipEl.offsetHeight, pad = 8;
  let left = r.left + r.width/2 - tw/2;
  left = Math.max(pad, Math.min(left, innerWidth - tw - pad));
  let top = r.top - th - 10;
  if(top < pad){ top = r.bottom + 10; }   // flip below if no room above
  tipEl.style.left = left + 'px';
  tipEl.style.top = top + 'px';
  // arrow points at the term even when the box was clamped to the viewport
  tipEl.style.setProperty('--ax', (r.left + r.width/2 - left) + 'px');
  tipEl.style.opacity = '1';
}
function hideTip(el){ if(!el || el===tipTerm){ tipEl.classList.remove('show'); tipTerm=null; } }
document.addEventListener('mouseover', e=>{ const g=e.target.closest('.gl'); if(g) showTip(g); });
document.addEventListener('mouseout',  e=>{ const g=e.target.closest('.gl'); if(g) hideTip(g); });
document.addEventListener('focusin',   e=>{ const g=e.target.closest('.gl'); if(g) showTip(g); });
document.addEventListener('focusout',  e=>{ const g=e.target.closest('.gl'); if(g) hideTip(g); });

function slideHTML(s){

  let body = '';

  if(s.kind==='cover'){
    return `<div class="wrap stag"><div class="head">
      <p class="step">${icon('i-logo')}github.com/nguyenhx2/agent-harness-bootstrap</p>
      <h1>${L(s.title)}</h1>${SQUIG}<p class="sub">${L(s.sub)}</p></div>
      <div class="body"><div class="coverwrap">
        <div>
          <p class="lead">${L(s.lead)}</p>

  }
  if(s.kind==='bullets'){
    body = `<ul class="big">${s.items.map(i=>
      `<li class="${s.cls||''}">${icon(s.icon,'ic')}<div><b>${L(i.t)}</b><span>${L(i.d)}</span></div>
        <svg class="tick"><use href="#s-star"/></svg></li>`).join('')}</ul>`;

  if(s.kind==='quotes'){

  if(s.kind==='video'){

      <div class="vidwrap"><video id="vid" src="../video/mp4/${s.clips[vidIdx].f}.mp4"
        controls autoplay muted loop playsinline preload="auto"></video></div>`;
  }
  if(s.kind==='ctxlayers'){
    body = `<div class="laywrap"><div class="lay">` + s.rows.map((r,i)=>
      `<div class="row ${r.cls}" style="animation-delay:${120+i*130}ms">
         ${icon(r.ic,'tic')}
         <span class="tag">${L(r.tag)}</span><span class="desc">${L(r.d)}</span><span class="meta">${L(r.m)}</span>
       </div>`).join('')
      + `<div class="brush"><svg viewBox="0 0 600 120" preserveAspectRatio="none"><use href="#s-brush"/></svg></div>`

`;

function fit(el){
  const b = el.querySelector('.body');
  if(!b || b.clientHeight <= 0) return;
  // Only the body scales. The header band is fixed so headings stay identical
  // in size and position on every slide.
  const overflows = () => b.scrollHeight > b.clientHeight + 1;
  let lo = 0.4, hi = 1.7, best = 0.4;
  for(let i=0;i<14;i++){
    const mid = (lo + hi) / 2;
    b.style.setProperty('--fit', mid);
    if(!overflows()){ best = mid; lo = mid; } else { hi = mid; }
    if(hi - lo < 0.008) break;
  }
  b.style.setProperty('--fit', best);
}

function render(dir){
  deck.innerHTML = '';
  const el = document.createElement('section');
  el.className = 'slide active ' + (dir==='prev' ? 'in-prev' : 'in-next');
  el.innerHTML = slideHTML(S[cur]);
  deck.appendChild(el);
  el.querySelectorAll('.stag > *').forEach((c,i)=>{ c.style.animationDelay = (60 + i*80) + 'ms'; });

  const vt = el.querySelector('#vtabs');
  if(vt) vt.addEventListener('click', e=>{
    const b = e.target.closest('button'); if(!b) return;
    vidIdx = +b.dataset.v;
    vt.querySelectorAll('button').forEach(x=>x.classList.toggle('on', x===b));
    const v = el.querySelector('#vid');
    v.src = '../video/mp4/' + S[cur].clips[vidIdx].f + '.mp4';
    v.load(); v.play().catch(()=>{});
  });

  fit(el);
  // A webfont swapping in after the first measurement changes the metrics, so
  // re-fit once the faces this slide needs have actually loaded.
  if(document.fonts && document.fonts.ready) document.fonts.ready.then(()=>fit(el));
  const vid = el.querySelector('#vid');
  if(vid) vid.addEventListener('loadedmetadata', ()=>fit(el), {once:true});

  counterEl.textContent = (cur+1) + ' ' + UI[lang].of + ' ' + S.length;
  document.getElementById('ovTitle').textContent = UI[lang].ov;
  document.documentElement.lang = lang==='ja'?'ja':lang==='vi'?'vi':'en';
  location.hash = '#' + (cur+1);
}

function go(i, dir){
  const n = Math.max(0, Math.min(S.length-1, i));
  const d = dir || (n > cur ? 'next' : 'prev');
  cur = n; tipEl.classList.remove("show"); render(d); marks();
}
function marks(){
  thumbsEl.querySelectorAll('.thumb').forEach((t,i)=>t.classList.toggle('on', i===cur));
  const t = thumbsEl.querySelector('.thumb.on');
  if(t && ovEl.classList.contains('open')) t.scrollIntoView({block:'nearest', behavior:'smooth'});
}
function buildNav(){
  thumbsEl.innerHTML = S.map((s,i)=>
    `<button class="thumb ${i===cur?'on':''}" data-i="${i}">
      <span class="mini"><span class="page-mini" data-mini="${i}"></span></span>
      <span class="cap">${icon(s.icon)}<span class="n">${String(i+1).padStart(2,'0')}</span>
        <span class="t">${(s.nav[lang]??s.nav.en)}</span></span>
    </button>`).join('');
  paintMinis();
}

/* Render each slide into its thumbnail at full size, then scale it down. The
   preview is the slide itself, so it cannot drift from the real thing. */
function paintMinis(){
  thumbsEl.querySelectorAll('[data-mini]').forEach(box=>{
    const i = +box.dataset.mini;
    box.innerHTML = `<section class="slide active mini-slide">${slideHTML(S[i])}</section>`;
    const holder = box.parentElement;
    const scale = holder.clientWidth / 1600;
    box.style.transform = `scale(${scale})`;
    const bd = box.querySelector('.body');
    if(bd) bd.style.setProperty('--fit', 1);
  });
}
thumbsEl.addEventListener('click', e=>{ const b=e.target.closest('.thumb'); if(b){ go(+b.dataset.i); closeOv(); } });

function openOv(){ ovEl.classList.add('open'); paintMinis(); marks(); }
function closeOv(){ ovEl.classList.remove('open'); }
document.getElementById('btnOv').onclick = ()=> ovEl.classList.contains('open') ? closeOv() : openOv();
document.getElementById('btnClose').onclick = closeOv;
document.getElementById('btnNext').onclick = ()=> go(cur+1,'next');
document.getElementById('btnPrev').onclick = ()=> go(cur-1,'prev');
document.getElementById('btnFull').onclick = ()=>{
  if(document.fullscreenElement) document.exitFullscreen();
  else document.documentElement.requestFullscreen().catch(()=>{});
};
document.getElementById('langs').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  lang = b.dataset.l; localStorage.setItem('ahb-lang', lang);
  document.querySelectorAll('#langs button').forEach(x=>x.classList.toggle('on', x===b));
  render('next'); buildNav(); marks();
});
function ovCols(){
  const t = getComputedStyle(thumbsEl).gridTemplateColumns;
  return Math.max(1, t.split(' ').filter(Boolean).length);
}
document.addEventListener('keydown', e=>{
  const open = ovEl.classList.contains('open');
  if(e.key==='Escape'){ closeOv(); return; }
  if(e.key==='Enter' && open){ closeOv(); return; }
  switch(e.key){
    case 'ArrowRight': case 'PageDown': case ' ': e.preventDefault(); go(cur+1,'next'); break;
    case 'ArrowLeft': case 'PageUp': e.preventDefault(); go(cur-1,'prev'); break;
    case 'ArrowDown': if(open){ e.preventDefault(); go(cur+ovCols(),'next'); } break;
    case 'ArrowUp': if(open){ e.preventDefault(); go(cur-ovCols(),'prev'); } break;
    case 'Home': e.preventDefault(); go(0,'prev'); break;
    case 'End': e.preventDefault(); go(S.length-1,'next'); break;
    case 'o': case 'O': open ? closeOv() : openOv(); break;
    case 'f': case 'F': document.getElementById('btnFull').click(); break;
  }
});
let x0=null;
deck.addEventListener('touchstart', e=>{ x0=e.changedTouches[0].clientX; }, {passive:true});
deck.addEventListener('touchend', e=>{
  if(x0===null) return;
  const dx = e.changedTouches[0].clientX - x0;
  if(Math.abs(dx) > 55) go(cur + (dx<0?1:-1), dx<0?'next':'prev');
  x0=null;
}, {passive:true});
addEventListener('resize', ()=>{ const el = deck.querySelector('.slide'); if(el) fit(el);
  if(ovEl.classList.contains('open')) paintMinis(); });

document.querySelectorAll('#langs button').forEach(b=>b.classList.toggle('on', b.dataset.l===lang));
cur = Math.max(0, Math.min(S.length-1, (parseInt((location.hash||'').replace('#',''))||1) - 1));
buildNav(); render('next'); marks();
</script>
</body>
</html>
