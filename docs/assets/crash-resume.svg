<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560" role="img" aria-label="Crash and resume. Before the crash the agent appends session-log rows to the task file as it works. The crash destroys the conversation and the model's working memory, but the branch, the task file up to its last written row, the board row and the history archive survive. Resume runs six steps: scan the active task directory, read the board and session log, verify the previous instance is terminated, reconcile orphaned worktrees and branches, verify against git state, and continue from the last recorded row." font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <title>Crash and resume - the IDE died, what now</title>

  <rect x="0" y="0" width="880" height="560" rx="10" fill="#23272B"/>

  <text x="16" y="34" font-size="17" font-weight="700" fill="#F8F9FA">The IDE died. What now?</text>
  <text x="16" y="56" font-size="13" fill="#ADB5BD">Recovery is a file read, not a re-derivation - because the agent wrote the record as it went.</text>

  <!-- ================= LEFT: before the crash ================= -->
  <rect x="16" y="72" width="272" height="30" rx="6" fill="#495057" stroke="#212529" stroke-width="2"/>
  <text x="152" y="92" font-size="14" font-weight="700" fill="#F8F9FA" text-anchor="middle">1. Before the crash</text>

  <rect x="32" y="116" width="116" height="48" rx="6" fill="#5A189A" stroke="#240046" stroke-width="2"/>
  <text x="90" y="137" font-size="13" font-weight="700" fill="#E0AAFF" text-anchor="middle">agent (model)</text>
  <text x="90" y="155" font-size="13" fill="#E0AAFF" text-anchor="middle">working</text>

  <rect x="156" y="116" width="116" height="48" rx="6" fill="#495057" stroke="#212529" stroke-width="2"/>
  <text x="214" y="137" font-size="13" fill="#F8F9FA" text-anchor="middle">board: Active</text>
  <text x="214" y="155" font-size="13" fill="#F8F9FA" text-anchor="middle">branch: feat/x</text>

  <!-- write arrows: agent -> task file, one per unit of work -->
  <line x1="52" y1="166" x2="52" y2="196" stroke="#E0AAFF" stroke-width="2"/>
  <polygon points="52,204 47,192 57,192" fill="#E0AAFF"/>
  <line x1="82" y1="166" x2="82" y2="196" stroke="#E0AAFF" stroke-width="2"/>
  <polygon points="82,204 77,192 87,192" fill="#E0AAFF"/>
  <line x1="112" y1="166" x2="112" y2="196" stroke="#E0AAFF" stroke-width="2"/>
  <polygon points="112,204 107,192 117,192" fill="#E0AAFF"/>
  <text x="128" y="190" font-size="13" font-weight="700" fill="#E0AAFF">writes as it goes</text>

  <rect x="32" y="206" width="240" height="150" rx="6" fill="#495057" stroke="#212529" stroke-width="2"/>
  <text x="44" y="228" font-size="13" font-weight="700" fill="#F8F9FA">docs/tasks/active/TASK-NNN.md</text>
  <text x="44" y="249" font-size="13" fill="#CED4DA">Date | Who | What | Result</text>

  <rect x="44" y="256" width="216" height="24" rx="4" fill="#2D6A4F" stroke="#081C15" stroke-width="1"/>
  <text x="52" y="273" font-size="13" fill="#D8F3DC">orchestrator | registered</text>
  <rect x="44" y="286" width="216" height="24" rx="4" fill="#2D6A4F" stroke="#081C15" stroke-width="1"/>
  <text x="52" y="303" font-size="13" fill="#D8F3DC">app-dev | branch created</text>
  <rect x="44" y="316" width="216" height="24" rx="4" fill="#2D6A4F" stroke="#081C15" stroke-width="1"/>
  <text x="52" y="333" font-size="13" fill="#D8F3DC">qa-test | tests green</text>

  <text x="32" y="374" font-size="13" fill="#DEE2E6">One row appended after every unit of</text>
  <text x="32" y="392" font-size="13" fill="#DEE2E6">work. The log is the evidence.</text>

  <!-- ================= MIDDLE: the crash ================= -->
  <rect x="304" y="72" width="216" height="30" rx="6" fill="#9D0208" stroke="#370617" stroke-width="2"/>
  <text x="412" y="92" font-size="14" font-weight="700" fill="#FFBA08" text-anchor="middle">2. The crash</text>

  <polygon points="396,112 436,112 414,142 442,142 392,182 408,150 386,150" fill="#9D0208" stroke="#370617" stroke-width="2"/>

  <rect x="316" y="190" width="192" height="100" rx="6" fill="#6C757D" stroke="#343A40" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="328" y="212" font-size="14" font-weight="700" fill="#F8F9FA">LOST</text>
  <text x="328" y="234" font-size="13" fill="#F8F9FA">the conversation</text>
  <text x="328" y="254" font-size="13" fill="#F8F9FA">the model's memory</text>
  <text x="328" y="274" font-size="13" fill="#F8F9FA">anything unsaved</text>

  <rect x="316" y="302" width="192" height="132" rx="6" fill="#495057" stroke="#212529" stroke-width="2"/>
  <text x="328" y="324" font-size="14" font-weight="700" fill="#F8F9FA">SURVIVES</text>
  <text x="328" y="346" font-size="13" fill="#F8F9FA">the branch</text>
  <text x="328" y="366" font-size="13" fill="#F8F9FA">the task file, up to its</text>
  <text x="328" y="384" font-size="13" fill="#F8F9FA">last written row</text>
  <text x="328" y="404" font-size="13" fill="#F8F9FA">the board row</text>
  <text x="328" y="424" font-size="13" fill="#F8F9FA">the history archive</text>

  <!-- ================= RIGHT: resume ================= -->
  <rect x="536" y="72" width="328" height="30" rx="6" fill="#2D6A4F" stroke="#081C15" stroke-width="2"/>
  <text x="700" y="92" font-size="14" font-weight="700" fill="#D8F3DC" text-anchor="middle">3. Resume, with an empty context</text>

  <rect x="548" y="118" width="22" height="22" rx="4" fill="#2D6A4F" stroke="#081C15" stroke-width="1"/>
  <text x="559" y="134" font-size="13" font-weight="700" fill="#D8F3DC" text-anchor="middle">1</text>
  <text x="582" y="128" font-size="13" fill="#F8F9FA">scan docs/tasks/active/ for a task whose</text>
  <text x="582" y="146" font-size="13" fill="#F8F9FA">status is Active, Blocked or Planned</text>

  <rect x="548" y="164" width="22" height="22" rx="4" fill="#2D6A4F" stroke="#081C15" stroke-width="1"/>
  <text x="559" y="180" font-size="13" font-weight="700" fill="#D8F3DC" text-anchor="middle">2</text>
  <text x="582" y="174" font-size="13" fill="#F8F9FA">read the board, then that task file's</text>
  <text x="582" y="192" font-size="13" fill="#F8F9FA">session log and orchestration notes</text>

  <rect x="548" y="210" width="22" height="22" rx="4" fill="#2D6A4F" stroke="#081C15" stroke-width="1"/>
  <text x="559" y="226" font-size="13" font-weight="700" fill="#D8F3DC" text-anchor="middle">3</text>
  <text x="582" y="220" font-size="13" fill="#F8F9FA">verify the previous instance is actually</text>
  <text x="582" y="238" font-size="13" fill="#F8F9FA">terminated - never assume. A silently</text>
  <text x="582" y="256" font-size="13" fill="#F8F9FA">stalled instance counts as crashed.</text>

  <rect x="548" y="274" width="22" height="22" rx="4" fill="#2D6A4F" stroke="#081C15" stroke-width="1"/>
  <text x="559" y="290" font-size="13" font-weight="700" fill="#D8F3DC" text-anchor="middle">4</text>
  <text x="582" y="284" font-size="13" fill="#F8F9FA">reconcile orphaned worktrees and</text>
  <text x="582" y="302" font-size="13" fill="#F8F9FA">branches against the board</text>

  <rect x="548" y="320" width="22" height="22" rx="4" fill="#2D6A4F" stroke="#081C15" stroke-width="1"/>
  <text x="559" y="336" font-size="13" font-weight="700" fill="#D8F3DC" text-anchor="middle">5</text>
  <text x="582" y="330" font-size="13" fill="#F8F9FA">verify against git state, not against any</text>
  <text x="582" y="348" font-size="13" fill="#F8F9FA">remembered summary</text>

  <rect x="548" y="366" width="22" height="22" rx="4" fill="#2D6A4F" stroke="#081C15" stroke-width="1"/>
  <text x="559" y="382" font-size="13" font-weight="700" fill="#D8F3DC" text-anchor="middle">6</text>
  <text x="582" y="376" font-size="13" fill="#F8F9FA">continue from the last recorded row</text>

  <text x="548" y="410" font-size="13" fill="#DEE2E6">Trust the committed files and git over any</text>
  <text x="548" y="428" font-size="13" fill="#DEE2E6">agent's final report.</text>

  <!-- caption -->
  <rect x="16" y="450" width="848" height="40" rx="8" fill="#2D6A4F" stroke="#081C15" stroke-width="2"/>
  <text x="440" y="475" font-size="15" font-weight="700" fill="#D8F3DC" text-anchor="middle">No re-derivation. This works only because the agent wrote as it went.</text>

  <!-- legend -->
  <rect x="16" y="510" width="16" height="16" rx="3" fill="#5A189A" stroke="#240046" stroke-width="2"/>
  <text x="40" y="523" font-size="13" fill="#DEE2E6">model</text>
  <rect x="110" y="510" width="16" height="16" rx="3" fill="#6C757D" stroke="#343A40" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="134" y="523" font-size="13" fill="#DEE2E6">volatile - lost</text>
  <rect x="256" y="510" width="16" height="16" rx="3" fill="#495057" stroke="#212529" stroke-width="2"/>
  <text x="280" y="523" font-size="13" fill="#DEE2E6">artifact - file on disk</text>
  <rect x="434" y="510" width="16" height="16" rx="3" fill="#2D6A4F" stroke="#081C15" stroke-width="2"/>
  <text x="458" y="523" font-size="13" fill="#DEE2E6">deterministic - durable, recoverable</text>
  <rect x="702" y="510" width="16" height="16" rx="3" fill="#9D0208" stroke="#370617" stroke-width="2"/>
  <text x="726" y="523" font-size="13" fill="#DEE2E6">the crash</text>
</svg>
