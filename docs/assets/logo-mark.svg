<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Agent Harness Bootstrap mark">
  <!-- Harness boundary -->
  <rect x="40" y="40" width="176" height="176" rx="40" ry="40"
        fill="none" stroke="#2D6A4F" stroke-width="16"/>

  <!-- Reins converging to the control point -->
  <path d="M84 62 L128 108 L172 62"
        fill="none" stroke="#52B788" stroke-width="12"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Agent hexagon held inside -->
  <polygon points="128,108 170,133 170,183 128,208 86,183 86,133"
           fill="#5A189A" stroke="#2D6A4F" stroke-width="8" stroke-linejoin="round"/>

  <!-- Bit control point -->
  <circle cx="128" cy="108" r="11" fill="#9D0208"/>
</svg>
