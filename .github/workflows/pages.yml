name: pages

# Serves the repo as a static site so the intro clips play in the browser
# (https://nguyenhx2.github.io/agent-harness-bootstrap/video/). This uploads the files as-is - no
# Jekyll - because the legacy Jekyll builder chokes on the spec-builder templates (their {{#IF_X}}
# blocks are Liquid-illegal, and a placeholder "<YYYY-MM-DD>" is not a valid Jekyll date). A .nojekyll
# file at the repo root keeps it that way.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-progress deploy; let each finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
